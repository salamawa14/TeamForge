<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TeamForge – Reset Password</title>
  <link rel="stylesheet" href="../assets/css/login.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="login-shell">

  <!-- ── LEFT PANEL ── -->
  <div class="left-panel">
    <div class="left-inner">

      <div class="brand">
        <span class="brand-hex">⬡</span>
        <span class="brand-name">TeamForge</span>
      </div>

      <div class="left-copy">
        <h1>Reset your password</h1>
        <p>Enter your new password below to complete the reset process.</p>
      </div>

    </div>
  </div>

  <!-- ── RIGHT PANEL ── -->
  <div class="right-panel">
    <div class="form-box">

      <div class="form-header">
        <h2>Reset Password</h2>
        <p>Choose a strong password for your account.</p>
      </div>

      <form id="resetForm" novalidate>

        <div class="field-group">
          <label for="newPassword">New Password</label>
          <div class="input-wrap">
            <input
              type="password"
              id="newPassword"
              name="newPassword"
              placeholder="Enter new password"
              autocomplete="new-password"
            />
            <button type="button" class="eye-btn" id="togglePwd" aria-label="Show password">
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="field-error" id="pwdError"></span>
        </div>

        <div class="field-group">
          <label for="confirmPassword">Confirm Password</label>
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            placeholder="Confirm new password"
            autocomplete="new-password"
          />
          <span class="field-error" id="confirmError"></span>
        </div>

        <button type="submit" class="btn-signin" id="resetBtn">
          <span class="btn-text">Reset Password</span>
          <span class="btn-spinner" id="btnSpinner" hidden></span>
        </button>

        <p class="first-time-note" style="text-align: center; margin-top: 20px;">
          <a href="login.html" class="link-muted">Back to Sign In</a>
        </p>

      </form>

      <!-- Toast notification -->
      <div class="toast" id="toast"></div>

    </div>
  </div>

</div>
<script src="../../teamforge-backend/assets/js/api.js"></script>
<script src="../assets/js/reset-password.js"></script>
</body>
</html>
